openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Gedilson Rai Barbershop API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: services
    description: Barbershop services
  - name: appointments
    description: Appointment management
  - name: auth
    description: Authentication
  - name: dashboard
    description: Admin dashboard data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all barbershop services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments with optional filters
      parameters:
        - in: query
          name: date
          schema:
            type: string
          description: Filter by specific date (YYYY-MM-DD)
        - in: query
          name: period
          schema:
            type: string
            enum: [day, week, month]
          description: Filter by period
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, completed, cancelled]
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create a new appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentBody"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "409":
          description: Time slot already booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /appointments/available-slots:
    get:
      operationId: getAvailableSlots
      tags: [appointments]
      summary: Get available time slots for a date and service
      parameters:
        - in: query
          name: date
          required: true
          schema:
            type: string
          description: Date in YYYY-MM-DD format
        - in: query
          name: serviceId
          required: true
          schema:
            type: string
          description: Service ID to check duration
      responses:
        "200":
          description: List of available time slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableSlots"

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get a single appointment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update an appointment (status, etc.)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentBody"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Delete an appointment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/revenue-chart:
    get:
      operationId: getRevenueChart
      tags: [dashboard]
      summary: Get daily revenue for the last 30 days
      responses:
        "200":
          description: Revenue chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueChartEntry"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Service:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        priceLabel:
          type: string
        durationMinutes:
          type: integer
        durationLabel:
          type: string
      required: [id, name, price, priceLabel, durationMinutes, durationLabel]

    Appointment:
      type: object
      properties:
        id:
          type: integer
        clientName:
          type: string
        clientPhone:
          type: string
        serviceId:
          type: string
        serviceName:
          type: string
        servicePrice:
          type: number
        date:
          type: string
        time:
          type: string
        status:
          type: string
          enum: [pending, completed, cancelled]
        createdAt:
          type: string
      required: [id, clientName, clientPhone, serviceId, serviceName, servicePrice, date, time, status, createdAt]

    CreateAppointmentBody:
      type: object
      properties:
        clientName:
          type: string
        clientPhone:
          type: string
        serviceId:
          type: string
        date:
          type: string
        time:
          type: string
      required: [clientName, clientPhone, serviceId, date, time]

    UpdateAppointmentBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, completed, cancelled]
        clientName:
          type: string
        clientPhone:
          type: string
        serviceId:
          type: string
        date:
          type: string
        time:
          type: string

    AvailableSlots:
      type: object
      properties:
        date:
          type: string
        slots:
          type: array
          items:
            type: string
      required: [date, slots]

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
      required: [success, token]

    DashboardSummary:
      type: object
      properties:
        todayRevenue:
          type: number
        monthRevenue:
          type: number
        todayAppointments:
          type: integer
        monthAppointments:
          type: integer
        pendingAppointments:
          type: integer
        completedToday:
          type: integer
      required: [todayRevenue, monthRevenue, todayAppointments, monthAppointments, pendingAppointments, completedToday]

    RevenueChartEntry:
      type: object
      properties:
        date:
          type: string
        revenue:
          type: number
        appointments:
          type: integer
      required: [date, revenue, appointments]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
