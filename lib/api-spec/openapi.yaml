openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Gedilson Rai Barbershop API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: services
    description: Barbershop services
  - name: appointments
    description: Appointment management
  - name: auth
    description: Authentication
  - name: dashboard
    description: Admin dashboard data
  - name: barbers
    description: Barber management
  - name: blocked-slots
    description: Blocked time slot management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all active barbershop services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a new service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceBody"
      responses:
        "201":
          description: Service created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    patch:
      operationId: updateService
      tags: [services]
      summary: Update a service
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServiceBody"
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete (deactivate) a service
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /barbers:
    get:
      operationId: listBarbers
      tags: [barbers]
      summary: List all barbers
      responses:
        "200":
          description: List of barbers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Barber"
    post:
      operationId: createBarber
      tags: [barbers]
      summary: Create a new barber
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBarberBody"
      responses:
        "201":
          description: Barber created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Barber"

  /barbers/{id}:
    get:
      operationId: getBarber
      tags: [barbers]
      summary: Get a single barber
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Barber details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Barber"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateBarber
      tags: [barbers]
      summary: Update a barber
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBarberBody"
      responses:
        "200":
          description: Updated barber
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Barber"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blocked-slots:
    get:
      operationId: listBlockedSlots
      tags: [blocked-slots]
      summary: List all blocked slots
      parameters:
        - in: query
          name: date
          schema:
            type: string
          description: Filter by date (YYYY-MM-DD)
      responses:
        "200":
          description: List of blocked slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlockedSlot"
    post:
      operationId: createBlockedSlot
      tags: [blocked-slots]
      summary: Block a time slot or full day
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBlockedSlotBody"
      responses:
        "201":
          description: Blocked slot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockedSlot"

  /blocked-slots/{id}:
    delete:
      operationId: deleteBlockedSlot
      tags: [blocked-slots]
      summary: Remove a blocked slot
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments with optional filters
      parameters:
        - in: query
          name: date
          schema:
            type: string
          description: Filter by specific date (YYYY-MM-DD)
        - in: query
          name: period
          schema:
            type: string
            enum: [day, week, month]
          description: Filter by period
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, completed, cancelled]
        - in: query
          name: barberId
          schema:
            type: string
          description: Filter by barber ID
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create a new appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentBody"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "409":
          description: Time slot already booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /appointments/available-slots:
    get:
      operationId: getAvailableSlots
      tags: [appointments]
      summary: Get available time slots for a date and service
      parameters:
        - in: query
          name: date
          required: true
          schema:
            type: string
          description: Date in YYYY-MM-DD format
        - in: query
          name: serviceId
          required: true
          schema:
            type: string
          description: Service ID to check duration
        - in: query
          name: barberId
          schema:
            type: string
          description: Filter conflicts for a specific barber
      responses:
        "200":
          description: List of available time slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableSlots"

  /appointments/recurring:
    post:
      operationId: createRecurringAppointments
      tags: [appointments]
      summary: Create recurring weekly appointments within a period
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecurringAppointmentBody"
      responses:
        "201":
          description: Recurring appointments created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringAppointmentResult"

  /appointments/export:
    get:
      operationId: exportAppointments
      tags: [appointments]
      summary: Export appointments as CSV
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [day, week, month, all]
          description: Period filter
        - in: query
          name: barberId
          schema:
            type: string
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /appointments/group/{groupId}:
    delete:
      operationId: deleteRecurringGroup
      tags: [appointments]
      summary: Delete all appointments in a recurrence group
      parameters:
        - in: path
          name: groupId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get a single appointment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update an appointment (status, etc.)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentBody"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Delete an appointment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/revenue-chart:
    get:
      operationId: getRevenueChart
      tags: [dashboard]
      summary: Get daily revenue for the last 30 days
      responses:
        "200":
          description: Revenue chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueChartEntry"

  /dashboard/services-chart:
    get:
      operationId: getServicesChart
      tags: [dashboard]
      summary: Get most sold services (count of completed appointments per service)
      responses:
        "200":
          description: Services chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServicesChartEntry"

  /dashboard/reminders:
    get:
      operationId: getDashboardReminders
      tags: [dashboard]
      summary: Get tomorrow's pending appointments for reminder sending
      responses:
        "200":
          description: List of pending appointments for tomorrow
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Service:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        priceLabel:
          type: string
        durationMinutes:
          type: integer
        durationLabel:
          type: string
        active:
          type: boolean
        sortOrder:
          type: integer
      required: [id, name, price, priceLabel, durationMinutes, durationLabel, active, sortOrder]

    CreateServiceBody:
      type: object
      properties:
        id:
          type: string
          description: URL-friendly unique ID (e.g. corte-simples)
        name:
          type: string
        price:
          type: number
        durationMinutes:
          type: integer
        sortOrder:
          type: integer
      required: [id, name, price, durationMinutes]

    UpdateServiceBody:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        durationMinutes:
          type: integer
        active:
          type: boolean
        sortOrder:
          type: integer

    BlockedSlot:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        time:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true
        allDay:
          type: boolean
        createdAt:
          type: string
      required: [id, date, allDay, createdAt]

    CreateBlockedSlotBody:
      type: object
      properties:
        date:
          type: string
          description: Date in YYYY-MM-DD format
        time:
          type: string
          nullable: true
          description: Specific time slot to block (HH:MM). If null, blocks entire day.
        reason:
          type: string
          nullable: true
        allDay:
          type: boolean
      required: [date]

    Barber:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        photo:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        birthDate:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        specialty:
          type: string
          nullable: true
        instagram:
          type: string
          nullable: true
        active:
          type: boolean
        createdAt:
          type: string
      required: [id, name, active, createdAt]

    CreateBarberBody:
      type: object
      properties:
        name:
          type: string
        photo:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        specialty:
          type: string
          nullable: true
      required: [name]

    UpdateBarberBody:
      type: object
      properties:
        name:
          type: string
        photo:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        birthDate:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        specialty:
          type: string
          nullable: true
        instagram:
          type: string
          nullable: true
        active:
          type: boolean

    Appointment:
      type: object
      properties:
        id:
          type: integer
        clientName:
          type: string
        clientPhone:
          type: string
        serviceId:
          type: string
        serviceName:
          type: string
        servicePrice:
          type: number
        date:
          type: string
        time:
          type: string
        status:
          type: string
          enum: [pending, completed, cancelled]
        barberId:
          type: string
          nullable: true
        isRecurring:
          type: boolean
        recurrenceType:
          type: string
          nullable: true
        recurrenceGroupId:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, clientName, clientPhone, serviceId, serviceName, servicePrice, date, time, status, isRecurring, createdAt]

    CreateAppointmentBody:
      type: object
      properties:
        clientName:
          type: string
        clientPhone:
          type: string
        serviceId:
          type: string
        date:
          type: string
        time:
          type: string
        barberId:
          type: string
          nullable: true
      required: [clientName, clientPhone, serviceId, date, time]

    UpdateAppointmentBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, completed, cancelled]
        clientName:
          type: string
        clientPhone:
          type: string
        serviceId:
          type: string
        date:
          type: string
        time:
          type: string
        barberId:
          type: string
          nullable: true

    AvailableSlots:
      type: object
      properties:
        date:
          type: string
        slots:
          type: array
          items:
            type: string
      required: [date, slots]

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
      required: [success, token]

    DashboardSummary:
      type: object
      properties:
        todayRevenue:
          type: number
        monthRevenue:
          type: number
        todayAppointments:
          type: integer
        monthAppointments:
          type: integer
        pendingAppointments:
          type: integer
        completedToday:
          type: integer
      required: [todayRevenue, monthRevenue, todayAppointments, monthAppointments, pendingAppointments, completedToday]

    RevenueChartEntry:
      type: object
      properties:
        date:
          type: string
        revenue:
          type: number
        appointments:
          type: integer
      required: [date, revenue, appointments]

    ServicesChartEntry:
      type: object
      properties:
        serviceId:
          type: string
        serviceName:
          type: string
        count:
          type: integer
        revenue:
          type: number
      required: [serviceId, serviceName, count, revenue]

    CreateRecurringAppointmentBody:
      type: object
      properties:
        clientName:
          type: string
        clientPhone:
          type: string
        serviceId:
          type: string
        time:
          type: string
        weekday:
          type: integer
          description: "Day of week: 0=Sunday, 1=Monday, ... 6=Saturday"
        period:
          type: string
          enum: [this_month, next_2_months]
        startDate:
          type: string
          description: Reference date to determine current month (YYYY-MM-DD)
        barberId:
          type: string
          nullable: true
      required: [clientName, clientPhone, serviceId, time, weekday, period, startDate]

    RecurringAppointmentResult:
      type: object
      properties:
        groupId:
          type: string
        created:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
        skipped:
          type: array
          items:
            type: string
          description: Dates that were skipped due to conflicts
      required: [groupId, created, skipped]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
