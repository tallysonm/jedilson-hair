kind = "web"
previewPath = "/"
title = "Gedilson Rai Barbershop"
version = "1.0.0"
id = "artifacts/barbershop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19483

[services.development]
run = "pnpm --filter @workspace/barbershop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/barbershop", "run", "build" ]
publicDir = "artifacts/barbershop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19483"
BASE_PATH = "/"
